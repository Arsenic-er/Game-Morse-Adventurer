name: Windows portable

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: windows-portable-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Test and package Windows x64
    runs-on: windows-latest
    timeout-minutes: 30
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Configure pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.12.1
          run_install: false

      - name: Configure Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install locked dependencies
        run: pnpm install --frozen-lockfile

      - name: Run automated tests
        run: pnpm test

      - name: Build portable executable
        run: pnpm run desktop:build

      - name: Verify executable and write checksum
        shell: pwsh
        run: |
          $path = Resolve-Path "release/CWGame-latest.exe"
          $file = Get-Item -LiteralPath $path
          if ($file.Length -lt 50MB) {
            throw "Portable executable is unexpectedly small: $($file.Length) bytes"
          }

          $stream = [System.IO.File]::OpenRead($path)
          try {
            $first = $stream.ReadByte()
            $second = $stream.ReadByte()
          } finally {
            $stream.Dispose()
          }
          if ($first -ne 0x4D -or $second -ne 0x5A) {
            throw "Portable artifact does not have a Windows PE MZ header"
          }

          $hash = (Get-FileHash -LiteralPath $path -Algorithm SHA256).Hash
          "$hash  CWGame-latest.exe" | Set-Content -LiteralPath "release/CWGame-latest.sha256" -Encoding ascii
          @"
          ## Windows portable artifact

          - Commit: ``${{ github.sha }}``
          - Size: ``$($file.Length) bytes``
          - SHA-256: ``$hash``
          - Signing: unsigned prototype build
          "@ | Add-Content -LiteralPath $env:GITHUB_STEP_SUMMARY -Encoding utf8

      - name: Upload portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: CWGame-Windows-x64-portable
          path: |
            release/CWGame-latest.exe
            release/CWGame-latest.sha256
          if-no-files-found: error
          retention-days: 30

